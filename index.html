<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="情绪擂台 - 一款16-bit像素风格的情绪调节小游戏">
  <meta name="theme-color" content="#1a1a2e">
  <title>情绪擂台 - 像素风格斗游戏</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- Phaser.js 游戏引擎 -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="app" role="application" aria-label="情绪擂台游戏">

    <!-- ========== 首页界面 ========== -->
    <section id="page-home" class="page active" aria-labelledby="home-title">
      <header class="page-header">
        <h1 id="home-title" class="game-title">情绪擂台</h1>
        <p class="game-subtitle">"面对情绪，不是逃避，而是勇敢地与它对话"</p>
        <!-- 像素风格battle logo -->
        <div class="battle-logo" aria-hidden="true">
          <canvas id="battle-logo-canvas" width="280" height="60"></canvas>
        </div>
      </header>

      <!-- 温馨提示居中不换行 -->
      <div class="home-warning-wrapper">
        <article class="warning-box warning-center" role="alert">
          <p class="warning-text-single">温馨提示：本游戏仅供娱乐和轻度情绪调节，如有严重情绪问题请寻求专业心理咨询帮助</p>
        </article>
      </div>

      <footer class="page-footer">
        <!-- 首页按钮布局：开始游戏居中拉长，其他三个按钮第二行左对齐 -->
        <nav class="btn-grid btn-grid-home" aria-label="主导航">
          <div class="btn-row-main">
            <button class="btn btn-primary btn-wide" onclick="showPage('select')">
              <span class="btn-text">🎮 开始游戏</span>
            </button>
          </div>
          <div class="btn-row-secondary">
            <button class="btn btn-secondary" onclick="showPage('stats')">
              <span class="btn-text">📊 战斗统计</span>
            </button>
            <button class="btn btn-secondary" onclick="showPage('settings')">
              <span class="btn-text">⚙️ 游戏设置</span>
            </button>
            <button class="btn btn-secondary" onclick="showPage('achievements')">
              <span class="btn-text">🏆 成就展示</span>
            </button>
          </div>
        </nav>
      </footer>
    </section>

    <!-- ========== 角色选择界面 ========== -->
    <section id="page-select" class="page" aria-labelledby="select-title">
      <header class="page-header">
        <h2 id="select-title" class="page-title">选择角色与对手</h2>
      </header>

      <main class="page-content">
        <!-- 选择器区域（方块选择形式） -->
        <div class="selectors-block-row">
          <!-- 角色选择器组 -->
          <div class="selector-block-group">
            <div class="selector-label">你的角色</div>
            <!-- 性别方块选择 -->
            <div class="block-selector-row">
              <div class="block-option selected" data-value="male" onclick="selectBlockOption('gender', 'male', '男性')">
                <span class="block-option-text">男性</span>
              </div>
              <div class="block-option" data-value="female" onclick="selectBlockOption('gender', 'female', '女性')">
                <span class="block-option-text">女性</span>
              </div>
            </div>
            <!-- 服装方块选择 -->
            <div class="block-selector-row">
              <div class="block-option selected" data-value="young" onclick="selectBlockOption('style', 'young', '休闲')">
                <span class="block-option-text">休闲</span>
              </div>
              <div class="block-option" data-value="student" onclick="selectBlockOption('style', 'student', '校服')">
                <span class="block-option-text">校服</span>
              </div>
              <div class="block-option" data-value="worker" onclick="selectBlockOption('style', 'worker', '西装')">
                <span class="block-option-text">西装</span>
              </div>
            </div>
          </div>

          <!-- VS徽章 -->
          <div class="vs-badge">VS</div>

          <!-- 情绪选择器组 -->
          <div class="selector-block-group">
            <div class="selector-label">对手情绪</div>
            <!-- 情绪方块选择 -->
            <div class="block-selector-row emotion-blocks">
              <div class="block-option selected" data-value="sadness" onclick="selectBlockOption('emotion', 'sadness', '沮丧')">
                <span class="block-option-text">沮丧</span>
              </div>
              <div class="block-option" data-value="fear" onclick="selectBlockOption('emotion', 'fear', '恐惧')">
                <span class="block-option-text">恐惧</span>
              </div>
              <div class="block-option" data-value="anger" onclick="selectBlockOption('emotion', 'anger', '愤怒')">
                <span class="block-option-text">愤怒</span>
              </div>
              <div class="block-option" data-value="jealousy" onclick="selectBlockOption('emotion', 'jealousy', '嫉妒')">
                <span class="block-option-text">嫉妒</span>
              </div>
              <div class="block-option" data-value="anxiety" onclick="selectBlockOption('emotion', 'anxiety', '焦虑')">
                <span class="block-option-text">焦虑</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-row">
          <!-- 角色预览 -->
          <div class="preview-box character-preview-box">
            <div class="preview-large" id="character-preview-large"></div>
            <input type="text" id="character-name-input" placeholder="角色昵称" maxlength="10">
          </div>

          <!-- 情绪预览 -->
          <div class="preview-box emotion-preview-box">
            <div class="preview-large emotion-preview-large" id="emotion-preview-large"></div>
            <input type="text" id="emotion-name-input" placeholder="情绪名称" maxlength="10">
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <nav class="btn-grid btn-grid-2">
          <button class="btn btn-primary" onclick="startBattleFromSelectors()">
            <span class="btn-text">⚔️ 开始战斗</span>
          </button>
          <button class="btn btn-back" onclick="showPage('home')">
            <span class="btn-text">← 返回首页</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 战斗界面 ========== -->
    <section id="page-battle" class="page" aria-labelledby="battle-title">
      <main class="battle-container">
        <!-- Phaser游戏容器（Phaser会自动创建Canvas） -->
        <div id="phaser-container" aria-label="战斗画面"></div>

        <aside class="battle-ui">
          <header class="battle-header">
            <h2 id="battle-title" class="sr-only">战斗进行中</h2>
            <div class="battle-stats" role="status" aria-live="polite">
              <div class="stat-item">
                <span class="stat-label">进度</span>
                <span class="stat-value" id="click-progress">0/20</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">用时</span>
                <span class="stat-value" id="battle-timer">0.0秒</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">距离</span>
                <span class="stat-value" id="distance-info">0px</span>
              </div>
            </div>
          </header>

          <div class="battle-actions">
            <!-- 3个按钮：一行布局（顺序：大招、逃跑、点击攻击） -->
            <nav class="btn-grid btn-grid-3">
              <button class="btn btn-ultimate" id="ultimate-btn" onclick="useUltimate()" aria-label="使用大招">
                <span class="btn-text">⚡ 大招</span>
              </button>
              <button class="btn btn-escape" onclick="escapeBattle()" aria-label="逃跑">
                <span class="btn-text">🏃 逃跑</span>
              </button>
              <button class="btn btn-attack" id="attack-btn" onclick="handleAttackClick()" aria-label="点击攻击">
                <span class="btn-text">👆 点击攻击</span>
              </button>
            </nav>
          </div>
        </aside>
      </main>
    </section>

    <!-- ========== 结算界面 ========== -->
    <section id="page-result" class="page" aria-labelledby="result-title">
      <header class="page-header">
        <h2 id="result-title" class="sr-only">战斗结算</h2>
      </header>

      <main class="page-content">
        <article id="result-content" class="result-card" aria-live="polite">
          <!-- 动态填充 -->
        </article>

        <article class="result-encouragement">
          <p id="encouragement-text"></p>
        </article>

        <article id="achievement-unlock" class="achievement-notice" style="display: none;" role="alert">
          <h3 class="achievement-title">🎉 成就解锁!</h3>
          <p class="achievement-name" id="unlock-name"></p>
        </article>

        <!-- 心得记录区域 -->
        <section class="journal-section" id="journal-section">
          <h3 class="journal-title">记录本次体验</h3>
          <div class="tag-selector" role="group" aria-label="选择标签">
            <button class="tag-btn" data-tag="work" onclick="selectTag('work')">💼 工作</button>
            <button class="tag-btn" data-tag="family" onclick="selectTag('family')">👨‍👩‍👧 家庭</button>
            <button class="tag-btn" data-tag="relationship" onclick="selectTag('relationship')">❤️ 情感</button>
            <button class="tag-btn" data-tag="luck" onclick="selectTag('luck')">🎲 纯倒霉</button>
          </div>
          <textarea id="journal-input" placeholder="记录本次游戏的心得和体验..." rows="4" aria-label="心得内容"></textarea>
          <button class="btn btn-primary btn-small" onclick="saveJournal()">💾 保存心得</button>
        </section>
      </main>

      <footer class="page-footer">
        <!-- 4个按钮：两行布局 -->
        <nav class="btn-grid btn-grid-3" aria-label="结算后操作">
          <button class="btn btn-breathing" onclick="showPage('breathing')">
            <span class="btn-text">🌬️ 呼吸练习</span>
          </button>
          <button class="btn btn-primary" onclick="showPage('select')">
            <span class="btn-text">🔄 再来一局</span>
          </button>
          <button class="btn btn-back" onclick="showPage('home')">
            <span class="btn-text">🏠 返回首页</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 呼吸练习界面 ========== -->
    <section id="page-breathing" class="page" aria-labelledby="breathing-title">
      <header class="page-header">
        <h2 id="breathing-title" class="page-title">呼吸练习</h2>
        <p class="breathing-subtitle">跟随圆圈的节奏，放松身心</p>
      </header>

      <main class="page-content breathing-content">
        <div class="breathing-circle-container" role="img" aria-label="呼吸引导圆圈">
          <div class="breathing-circle" id="breathing-circle"></div>
          <div class="breathing-info">
            <p class="breathing-phase" id="breathing-phase" aria-live="polite">吸气...</p>
            <p class="breathing-count" id="breathing-count">4秒</p>
          </div>
        </div>

        <div class="breathing-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="8">
          <span class="progress-label">进度:</span>
          <span class="progress-value" id="breathing-progress-num">0</span>
          <span class="progress-max">/8轮</span>
        </div>
      </main>

      <footer class="page-footer">
        <!-- 1个按钮：居中布局 -->
        <nav class="btn-grid btn-grid-1">
          <button class="btn btn-secondary" onclick="endBreathing()">
            <span class="btn-text">✓ 结束练习</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 设置界面 ========== -->
    <section id="page-settings" class="page" aria-labelledby="settings-title">
      <header class="page-header">
        <h2 id="settings-title" class="page-title">游戏设置</h2>
      </header>

      <main class="page-content">
        <div class="settings-list" role="list">
          <div class="setting-item" role="listitem">
            <div class="setting-info">
              <span class="setting-icon">🔊</span>
              <span class="setting-label">音效</span>
            </div>
            <button class="toggle-btn" id="sound-toggle" onclick="toggleSound()" aria-pressed="true">
              开启
            </button>
          </div>
          <div class="setting-item" role="listitem">
            <div class="setting-info">
              <span class="setting-icon">📳</span>
              <span class="setting-label">震动</span>
            </div>
            <button class="toggle-btn" id="vibration-toggle" onclick="toggleVibration()" aria-pressed="true">
              开启
            </button>
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <!-- 2个按钮：一行布局 -->
        <nav class="btn-grid btn-grid-2" aria-label="设置操作">
          <button class="btn btn-primary" onclick="saveSettings()">
            <span class="btn-text">💾 保存设置</span>
          </button>
          <button class="btn btn-back" onclick="showPage('home')">
            <span class="btn-text">← 返回首页</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 成就界面 ========== -->
    <section id="page-achievements" class="page" aria-labelledby="achievements-title">
      <header class="page-header">
        <h2 id="achievements-title" class="page-title">成就展示</h2>
      </header>

      <main class="page-content scrollable">
        <div id="achievements-list" class="achievements-list" role="list">
          <!-- 动态填充 -->
        </div>
      </main>

      <footer class="page-footer">
        <!-- 1个按钮：居中布局 -->
        <nav class="btn-grid btn-grid-1">
          <button class="btn btn-back" onclick="showPage('home')">
            <span class="btn-text">← 返回首页</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 统计界面 ========== -->
    <section id="page-stats" class="page" aria-labelledby="stats-title">
      <header class="page-header">
        <h2 id="stats-title" class="page-title">战斗统计</h2>
      </header>

      <main class="page-content scrollable">
        <!-- 总览统计 -->
        <div class="stats-overview">
          <div class="stat-card">
            <span class="stat-icon">⚔️</span>
            <span class="stat-value" id="total-battles">0</span>
            <span class="stat-label">总战斗</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon">🏆</span>
            <span class="stat-value" id="total-victories">0</span>
            <span class="stat-label">胜利</span>
          </div>
          <div class="stat-card">
            <span class="stat-icon">📊</span>
            <span class="stat-value" id="win-rate">0%</span>
            <span class="stat-label">胜率</span>
          </div>
        </div>

        <!-- 胜率饼图 -->
        <div class="chart-section">
          <h3 class="section-label">胜率分布</h3>
          <canvas id="win-rate-chart" width="150" height="150"></canvas>
        </div>

        <!-- 情绪战斗次数柱状图 -->
        <div class="chart-section">
          <h3 class="section-label">情绪战斗次数</h3>
          <canvas id="emotion-battle-chart" width="280" height="100"></canvas>
        </div>

        <!-- 情绪胜率统计 -->
        <div class="emotion-stats-section">
          <h3 class="section-label">各情绪胜率</h3>
          <div id="emotion-stats-list" class="emotion-stats-list">
            <!-- 动态填充 -->
          </div>
        </div>
      </main>

      <footer class="page-footer">
        <nav class="btn-grid btn-grid-1">
          <button class="btn btn-back" onclick="showPage('home')">
            <span class="btn-text">← 返回首页</span>
          </button>
        </nav>
      </footer>
    </section>

    <!-- ========== 弹窗 ========== -->
    <div id="note-modal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-backdrop" onclick="closeNoteModal()"></div>
      <div class="modal-content">
        <header class="modal-header">
          <h3 id="modal-title">编辑备注</h3>
          <button class="modal-close" onclick="closeNoteModal()" aria-label="关闭弹窗">×</button>
        </header>
        <main class="modal-body">
          <textarea id="note-input" placeholder="输入备注内容..." aria-label="备注内容"></textarea>
        </main>
        <footer class="modal-footer">
          <!-- 2个按钮：一行布局 -->
          <nav class="btn-grid btn-grid-2">
            <button class="btn btn-primary" onclick="saveNote()">
              <span class="btn-text">保存</span>
            </button>
            <button class="btn btn-secondary" onclick="closeNoteModal()">
              <span class="btn-text">取消</span>
            </button>
          </nav>
        </footer>
      </div>
    </div>
  </div>

  <!-- JavaScript 文件 -->
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/phaser-game.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/breathing.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
